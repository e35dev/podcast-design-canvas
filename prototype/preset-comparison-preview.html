<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preset Comparison Preview Prototype</title>
    <style>
      :root {
        --ink: #17211d;
        --muted: #60706a;
        --line: #d7e1dd;
        --surface: #f8fbfa;
        --accent: #0f6a57;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body { margin: 0; color: var(--ink); background: #ffffff; }

      main { max-width: 1100px; margin: 0 auto; padding: 32px 20px 48px; }

      h1, h2, p { margin-top: 0; }

      h1 { font-size: 26px; margin-bottom: 6px; }

      .lede { color: var(--muted); max-width: 720px; margin-bottom: 24px; }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        margin-bottom: 24px;
      }

      .control { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: var(--muted); }

      .control select, .toggle {
        font-family: inherit;
        font-size: 14px;
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 10px;
        background: #ffffff;
        cursor: pointer;
      }

      .toggle[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: #ffffff; }

      .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }

      @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

      .preset { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; }

      .stage {
        position: relative;
        background: #11201b;
        color: #f4f9f7;
        aspect-ratio: 16 / 9;
        padding: 14px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      .stage.vertical { aspect-ratio: 9 / 16; width: 70%; margin: 0 auto; }

      .frames { position: absolute; inset: 14px 14px 64px; display: grid; gap: 8px; }
      .frames.split { grid-template-columns: 1fr 1fr; }
      .frames.stacked { grid-template-rows: 1fr 1fr; }

      .frame {
        border-radius: 8px;
        background: linear-gradient(135deg, #2c463d, #1c322b);
        border: 1px solid rgba(255, 255, 255, 0.14);
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        padding: 6px;
      }

      .speaker-tag { font-size: 11px; background: rgba(0, 0, 0, 0.45); padding: 2px 7px; border-radius: 999px; }

      .lower-third {
        position: relative;
        z-index: 2;
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.92);
        color: var(--ink);
        border-radius: 8px;
        padding: 6px 10px;
        max-width: 80%;
      }

      .lower-third strong { display: block; font-size: 13px; }
      .lower-third span { font-size: 11px; color: var(--muted); }
      .lower-third.bold { background: var(--accent); color: #ffffff; }
      .lower-third.bold span { color: rgba(255, 255, 255, 0.8); }

      .caption { position: relative; z-index: 2; margin-top: 8px; font-weight: 600; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6); }
      .caption.calm { font-weight: 500; opacity: 0.95; }

      .brand-mark {
        position: absolute;
        top: 12px;
        left: 14px;
        z-index: 2;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.85;
      }

      .meta { padding: 14px 16px 16px; }
      .preset-name { font-weight: 600; margin-bottom: 2px; }
      .preset-fit { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

      .signals { list-style: none; margin: 0 0 14px; padding: 0; font-size: 13px; }
      .signals li { display: flex; justify-content: space-between; gap: 12px; padding: 4px 0; border-bottom: 1px solid var(--line); }
      .signals li:last-child { border-bottom: none; }
      .signals .k { color: var(--muted); }

      .apply {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #ffffff;
        border-radius: 8px;
        padding: 9px 14px;
        font-size: 14px;
        font-family: inherit;
        cursor: pointer;
        width: 100%;
      }

      .applied-note { margin-top: 18px; font-size: 14px; color: var(--accent); min-height: 20px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Preset Comparison Preview</h1>
      <p class="lede">
        Preview multiple presets against the same real episode moment and pick
        the one that fits the show — without opening a blank canvas. Previews use
        the current episode's speakers and brand kit, never generic placeholders.
      </p>

      <div class="controls">
        <label class="control">
          Episode moment
          <select id="moment"></select>
        </label>
        <label class="control">
          Framing
          <select id="framing">
            <option value="wide">Wide layout</option>
            <option value="mobile">Mobile vertical</option>
          </select>
        </label>
        <div class="control">
          Brand kit
          <button class="toggle" id="brand" type="button" aria-pressed="true">On</button>
        </div>
      </div>

      <div class="grid" id="grid"></div>
      <p class="applied-note" id="note"></p>
    </main>

    <script>
      // Grounded in the current episode: real speaker names/roles, not placeholders.
      var EPISODE = {
        show: "Signal & Noise",
        speakers: [
          { name: "Maya Okafor", role: "Host", handle: "@mayaok" },
          { name: "Dev Patel", role: "Guest", handle: "@devpatel" }
        ],
        moments: [
          { id: "m1", at: "04:12", line: "So the whole launch nearly fell apart the night before." },
          { id: "m2", at: "18:40", line: "Let's break down how the funding round came together." },
          { id: "m3", at: "31:05", line: "Here's the one decision I'd undo if I could." }
        ]
      };

      // Fixed preset definitions — no inference, purely descriptive comparison.
      var PRESETS = [
        { name: "Studio Clean", fit: "Two-person interviews", layout: "split", tone: "calm", lower: "subtle",
          pacing: "Calm, conversation-led", speakers: "1–3 speakers", branding: "Light", broll: "Sparse", caption: "Clean lower captions" },
        { name: "Bold Show", fit: "Host-led flagship episodes", layout: "solo", tone: "energetic", lower: "bold",
          pacing: "Energetic, punchy cuts", speakers: "1–2 speakers", branding: "Strong", broll: "Frequent", caption: "Bold animated captions" },
        { name: "Panel Grid", fit: "Panels and roundtables", layout: "stacked", tone: "calm", lower: "subtle",
          pacing: "Even, multi-speaker", speakers: "3–5 speakers", branding: "Medium", broll: "Moderate", caption: "Compact captions" },
        { name: "Story Frame", fit: "Narrative and solo shows", layout: "solo", tone: "calm", lower: "subtle",
          pacing: "Cinematic, slower", speakers: "1–2 speakers", branding: "Light", broll: "Frequent", caption: "Centered narrative captions" }
      ];

      var state = { momentId: "m1", framing: "wide", brand: true };

      function currentMoment() {
        return EPISODE.moments.find(function (m) { return m.id === state.momentId; });
      }

      function renderStage(preset) {
        var moment = currentMoment();
        var speaker = EPISODE.speakers[0];
        var frameCount = preset.layout === "solo" ? 1 : 2;

        var stage = document.createElement("div");
        stage.className = "stage" + (state.framing === "mobile" ? " vertical" : "");

        if (state.brand) {
          var brand = document.createElement("div");
          brand.className = "brand-mark";
          brand.textContent = EPISODE.show;
          stage.appendChild(brand);
        }

        var frames = document.createElement("div");
        frames.className = "frames " + preset.layout;
        for (var i = 0; i < frameCount; i++) {
          var sp = EPISODE.speakers[i] || EPISODE.speakers[0];
          var frame = document.createElement("div");
          frame.className = "frame";
          frame.innerHTML = '<span class="speaker-tag">' + sp.name + "</span>";
          frames.appendChild(frame);
        }
        stage.appendChild(frames);

        var lt = document.createElement("div");
        lt.className = "lower-third" + (preset.lower === "bold" ? " bold" : "");
        lt.innerHTML = "<strong>" + speaker.name + "</strong><span>" + speaker.role + " · " + speaker.handle + "</span>";
        stage.appendChild(lt);

        var cap = document.createElement("div");
        cap.className = "caption " + preset.tone;
        cap.textContent = '"' + moment.line + '"';
        stage.appendChild(cap);

        return stage;
      }

      function renderSignals(preset) {
        var rows = [
          ["Best-fit format", preset.fit],
          ["Pacing feel", preset.pacing],
          ["Speaker support", preset.speakers],
          ["Caption style", preset.caption],
          ["Branding strength", preset.branding],
          ["B-roll intensity", preset.broll]
        ];
        var ul = document.createElement("ul");
        ul.className = "signals";
        rows.forEach(function (r) {
          var li = document.createElement("li");
          li.innerHTML = '<span class="k">' + r[0] + "</span><span>" + r[1] + "</span>";
          ul.appendChild(li);
        });
        return ul;
      }

      function render() {
        var grid = document.getElementById("grid");
        grid.innerHTML = "";
        PRESETS.forEach(function (preset) {
          var card = document.createElement("div");
          card.className = "preset";
          card.appendChild(renderStage(preset));

          var meta = document.createElement("div");
          meta.className = "meta";
          meta.innerHTML =
            '<div class="preset-name">' + preset.name + "</div>" +
            '<div class="preset-fit">' + preset.fit + "</div>";
          meta.appendChild(renderSignals(preset));

          var apply = document.createElement("button");
          apply.className = "apply";
          apply.type = "button";
          apply.textContent = "Apply " + preset.name + " to full episode";
          apply.addEventListener("click", function () {
            document.getElementById("note").textContent =
              "Applied " + preset.name +
              " to the full episode. Fine-tune it in the canvas or save it as a template.";
          });
          meta.appendChild(apply);

          card.appendChild(meta);
          grid.appendChild(card);
        });
      }

      function initControls() {
        var moment = document.getElementById("moment");
        EPISODE.moments.forEach(function (m) {
          var opt = document.createElement("option");
          opt.value = m.id;
          opt.textContent = m.at + " — " + m.line.slice(0, 36) + "…";
          moment.appendChild(opt);
        });
        moment.addEventListener("change", function () { state.momentId = moment.value; render(); });

        document.getElementById("framing").addEventListener("change", function (e) {
          state.framing = e.target.value;
          render();
        });

        var brand = document.getElementById("brand");
        brand.addEventListener("click", function () {
          state.brand = !state.brand;
          brand.setAttribute("aria-pressed", state.brand ? "true" : "false");
          brand.textContent = state.brand ? "On" : "Off";
          render();
        });
      }

      initControls();
      render();
    </script>
  </body>
</html>
