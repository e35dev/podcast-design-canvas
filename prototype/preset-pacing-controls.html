<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preset Pacing Controls Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #16211f;
        --muted: #5e6b67;
        --line: #d9e0dd;
        --panel: #f7faf8;
        --accent: #136f63;
        --warn: #a15c00;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; color: var(--ink); background: #ffffff; }
      main { max-width: 1180px; margin: 0 auto; padding: 32px 20px 48px; }
      h1, h2, p { margin-top: 0; }
      h1 { font-size: 32px; line-height: 1.1; margin-bottom: 8px; }
      .lede { color: var(--muted); max-width: 760px; }
      .workspace { display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, 0.9fr); gap: 24px; margin-top: 28px; }
      .panel { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 18px; }
      .options { display: grid; gap: 10px; }
      .option { display: grid; grid-template-columns: auto minmax(0,1fr); gap: 12px; align-items: start; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: pointer; }
      .option.selected { outline: 2px solid var(--accent); outline-offset: 1px; }
      .option input { margin-top: 3px; }
      .option .name { font-weight: 700; }
      .option .desc { color: var(--muted); font-size: 13px; }
      label.field { display: grid; gap: 6px; color: var(--muted); font-size: 13px; margin-top: 4px; }
      select { min-height: 40px; border: 1px solid #bfcbc7; border-radius: 6px; background: #fff; color: var(--ink); font: inherit; padding: 8px 10px; }
      .effects { display: grid; gap: 10px; margin-top: 6px; }
      .effect { display: grid; grid-template-columns: 150px 1fr auto; gap: 10px; align-items: center; }
      .effect .elabel { font-size: 13px; color: var(--ink); }
      .bar { height: 10px; border-radius: 999px; background: #e7ece9; overflow: hidden; }
      .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
      .level { font-size: 12px; font-weight: 700; color: var(--muted); min-width: 56px; text-align: right; }
      .timeline { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 4px; height: 46px; margin: 4px 0 12px; align-items: end; }
      .timeline .tick { background: var(--accent); border-radius: 3px 3px 0 0; opacity: 0.85; }
      .note { color: var(--muted); font-size: 13px; margin-top: 12px; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
      button { min-height: 40px; border: 1px solid #0f5d53; border-radius: 6px; background: var(--accent); color: #fff; font: inherit; font-weight: 700; padding: 8px 12px; cursor: pointer; }
      button.secondary { background: #fff; color: var(--accent); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .applied { border-left: 4px solid var(--accent); border-radius: 6px; background: #fff; padding: 12px; margin-top: 12px; }
      .applied strong { display: block; margin-bottom: 4px; }
      .applied span { color: var(--muted); }
      @media (max-width: 860px) { .workspace { grid-template-columns: 1fr; } .effect { grid-template-columns: 120px 1fr auto; } }
    </style>
  </head>
  <body data-style-step="preset-pacing-controls">
    <main>
      <h1>Preset pacing controls</h1>
      <p class="lede">Choose how energetic the episode feels. Pacing shapes title moments, b-roll, caption emphasis, and transitions across the whole episode &mdash; without changing what was said. Preview it on a real moment before applying.</p>

      <section class="workspace" aria-label="Preset pacing workspace">
        <div class="panel">
          <h2>Pacing feel</h2>
          <div class="options" id="options" role="radiogroup" aria-label="Pacing feel"></div>
          <label class="field">Preview this moment
            <select id="moment" aria-label="Preview moment"></select>
          </label>
        </div>

        <aside class="panel" aria-live="polite" aria-label="Pacing preview">
          <h2>How this moment feels</h2>
          <div class="timeline" id="timeline" aria-hidden="true"></div>
          <div class="effects" id="effects"></div>
          <p class="note" id="note"></p>
          <div class="actions">
            <button type="button" id="apply">Apply pacing to the episode</button>
            <button type="button" class="secondary" id="reset">Reset</button>
          </div>
          <div id="applied"></div>
        </aside>
      </section>
    </main>

    <script>
      "use strict";

      function el(tag, props, children) {
        const node = document.createElement(tag);
        const s = props || {};
        Object.keys(s).forEach(function (k) {
          if (k === "class") { node.className = s[k]; }
          else if (k === "text") { node.textContent = s[k]; }
          else { node.setAttribute(k, s[k]); }
        });
        (children || []).forEach(function (c) { node.appendChild(c); });
        return node;
      }

      // Each pacing feel sets effect intensities on a 0-3 scale. Higher = more frequent
      // or stronger; the product never changes the conversation's meaning to add energy.
      const PACING = {
        calm: { label: "Calm interview", desc: "Steady, unhurried; lets answers breathe.",
          fx: { title: 1, broll: 1, caption: 1, transition: 1, pause: 1, chapter: 1 } },
        balanced: { label: "Balanced conversation", desc: "A natural mix of energy and space.",
          fx: { title: 2, broll: 2, caption: 2, transition: 2, pause: 2, chapter: 2 } },
        punchy: { label: "Punchy commentary", desc: "Tighter cuts, more visual moments.",
          fx: { title: 3, broll: 3, caption: 3, transition: 3, pause: 3, chapter: 2 } },
        teaching: { label: "Teaching focused", desc: "Clear titles and chapters for explanations.",
          fx: { title: 3, broll: 2, caption: 3, transition: 1, pause: 1, chapter: 3 } },
        panel: { label: "Panel discussion", desc: "Frequent speaker changes, lighter overlays.",
          fx: { title: 1, broll: 1, caption: 2, transition: 3, pause: 2, chapter: 2 } },
        sponsor: { label: "Sponsor-friendly", desc: "Calm base with clear sponsor moments.",
          fx: { title: 2, broll: 2, caption: 2, transition: 2, pause: 1, chapter: 2 } },
      };

      const EFFECTS = [
        { key: "title", label: "Title moments" },
        { key: "broll", label: "B-roll intensity" },
        { key: "caption", label: "Caption emphasis" },
        { key: "transition", label: "Transition strength" },
        { key: "pause", label: "Pause trimming" },
        { key: "chapter", label: "Chapter density" },
      ];

      // Preview moments shape the energy curve so the creator sees that a pacing feel
      // works across different parts of the episode, not just one clip.
      const MOMENTS = {
        opening: { label: "Episode opening", shape: [2, 3, 3, 2, 2, 3, 2, 1] },
        energy: { label: "High-energy exchange", shape: [3, 3, 2, 3, 3, 2, 3, 3] },
        quiet: { label: "Quiet explanation", shape: [1, 1, 2, 1, 1, 2, 1, 1] },
        chapter: { label: "Chapter transition", shape: [1, 2, 3, 2, 1, 1, 2, 1] },
        sponsor: { label: "Sponsor or metadata moment", shape: [2, 2, 1, 2, 2, 1, 2, 2] },
      };

      const LEVELS = ["off", "subtle", "balanced", "strong"];

      let selectedPacing = "balanced";
      let selectedMoment = "opening";
      let appliedPacing = null;

      const optionsEl = document.querySelector("#options");
      const momentEl = document.querySelector("#moment");
      const timelineEl = document.querySelector("#timeline");
      const effectsEl = document.querySelector("#effects");
      const noteEl = document.querySelector("#note");
      const appliedEl = document.querySelector("#applied");
      const applyBtn = document.querySelector("#apply");

      momentEl.addEventListener("change", function () { selectedMoment = momentEl.value; render(); });
      applyBtn.addEventListener("click", function () { appliedPacing = selectedPacing; render(); });
      document.querySelector("#reset").addEventListener("click", function () {
        selectedPacing = "balanced"; selectedMoment = "opening"; appliedPacing = null; render();
      });

      // Pure: the effect intensities (0-3) a pacing feel applies. Exported for tests.
      function effectLevels(pacing) {
        return PACING[pacing] ? PACING[pacing].fx : null;
      }

      // Pure: per-bar heights for the energy timeline, combining the moment's shape
      // with the pacing's overall energy. Exported for tests.
      function timelineHeights(pacing, moment) {
        const energy = PACING[pacing] ? (PACING[pacing].fx.transition + PACING[pacing].fx.broll) / 2 : 2;
        const shape = (MOMENTS[moment] || MOMENTS.opening).shape;
        return shape.map(function (v) {
          const h = Math.round((v / 3) * (0.6 + energy / 6) * 100);
          return Math.max(12, Math.min(100, h));
        });
      }

      function render() {
        optionsEl.replaceChildren.apply(optionsEl, Object.keys(PACING).map(function (key) {
          const radio = el("input", { type: "radio", name: "pacing", value: key, "aria-label": PACING[key].label });
          if (key === selectedPacing) { radio.checked = true; }
          radio.addEventListener("change", function () { selectedPacing = key; render(); });
          const main = el("div", {}, [el("div", { class: "name", text: PACING[key].label }, []), el("div", { class: "desc", text: PACING[key].desc }, [])]);
          const card = el("label", { class: "option" + (key === selectedPacing ? " selected" : "") }, [radio, main]);
          return card;
        }));

        if (momentEl.children.length === 0) {
          momentEl.replaceChildren.apply(momentEl, Object.keys(MOMENTS).map(function (key) {
            const o = el("option", { value: key, text: MOMENTS[key].label }, []);
            if (key === selectedMoment) { o.setAttribute("selected", "selected"); }
            return o;
          }));
        }

        const heights = timelineHeights(selectedPacing, selectedMoment);
        timelineEl.replaceChildren.apply(timelineEl, heights.map(function (h) {
          const tick = el("div", { class: "tick" }, []);
          tick.style.height = h + "%";
          return tick;
        }));

        const fx = effectLevels(selectedPacing);
        effectsEl.replaceChildren.apply(effectsEl, EFFECTS.map(function (e) {
          const fill = el("span", {}, []);
          fill.style.width = Math.round((fx[e.key] / 3) * 100) + "%";
          const bar = el("div", { class: "bar" }, [fill]);
          const level = el("div", { class: "level", text: LEVELS[fx[e.key]] }, []);
          return el("div", { class: "effect" }, [el("div", { class: "elabel", text: e.label }, []), bar, level]);
        }));

        noteEl.textContent = PACING[selectedPacing].label + " keeps the meaning intact and shapes "
          + MOMENTS[selectedMoment].label.toLowerCase() + " across the episode, not just one clip.";

        applyBtn.disabled = appliedPacing === selectedPacing;

        if (appliedPacing) {
          appliedEl.replaceChildren(el("div", { class: "applied" }, [
            el("strong", { text: "Applied: " + PACING[appliedPacing].label }, []),
            el("span", { text: appliedPacing === selectedPacing
              ? "This pacing is applied across the episode. Preview any moment to confirm the feel."
              : "Applied pacing is " + PACING[appliedPacing].label + "; you are previewing " + PACING[selectedPacing].label + ". Apply again to switch." }, []),
          ]));
        } else {
          appliedEl.replaceChildren();
        }
      }

      if (typeof module !== "undefined" && module.exports) {
        module.exports = { effectLevels: effectLevels, timelineHeights: timelineHeights, PACING: PACING, MOMENTS: MOMENTS };
      }

      render();
    </script>
    <script src="../preview/style-nav.js" defer></script>
  </body>
</html>
