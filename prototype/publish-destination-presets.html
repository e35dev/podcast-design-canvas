<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Publish Destination Presets Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #16211f;
        --muted: #5e6b67;
        --line: #d9e0dd;
        --panel: #f7faf8;
        --accent: #136f63;
        --accent-ink: #075246;
        --warn: #a15c00;
        --block: #a52828;
        --ok: #1a7a3a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1, h2, p { margin-top: 0; }

      h1 {
        font-size: 32px;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .lede {
        color: var(--muted);
        max-width: 760px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        gap: 24px;
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }

      .panel + .panel { margin-top: 18px; }

      .panel h2 {
        font-size: 16px;
        margin-bottom: 12px;
      }

      .dest-card {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        gap: 12px;
        padding: 14px 16px;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        margin-bottom: 10px;
      }

      .dest-card.primary {
        border-color: var(--accent);
        background: #ecf5f3;
      }

      .dest-card .name {
        font-weight: 700;
        font-size: 14px;
      }

      .dest-card .desc {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .dest-card .badge {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 4px;
        white-space: nowrap;
      }

      .badge.primary-badge {
        background: var(--accent);
        color: #ffffff;
      }

      .badge.additional-badge {
        background: #e0ecea;
        color: var(--accent-ink);
      }

      .badge.off-badge {
        background: var(--panel);
        color: var(--muted);
      }

      .dest-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      button {
        font: inherit;
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--ink);
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
      }

      button:hover { background: var(--panel); }

      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .outcomes {
        display: grid;
        gap: 8px;
      }

      .outcome-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        font-size: 13px;
      }

      .outcome-row .label {
        font-weight: 600;
      }

      .outcome-row .value {
        color: var(--muted);
        font-size: 12px;
      }

      .outcome-row select {
        min-height: 32px;
        border: 1px solid #bfcbc7;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-size: 12px;
        padding: 4px 8px;
      }

      .warnings {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .warning {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
      }

      .warning.review {
        background: #fefbec;
        color: var(--warn);
        border: 1px solid #f0dca0;
      }

      .warning.blocker {
        background: #fef2f2;
        color: var(--block);
        border: 1px solid #f5c6c6;
      }

      .warning.ok {
        background: #ecfdf5;
        color: var(--ok);
        border: 1px solid #a7f3d0;
      }

      .fix-link {
        font-size: 12px;
        font-weight: 700;
        color: var(--accent-ink);
        text-decoration: none;
        margin-left: 6px;
      }

      .fix-link:hover { text-decoration: underline; }

      @media (max-width: 860px) {
        .workspace { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body data-publish-step="publish-destination-presets">
    <main>
      <h1>Publish destination presets</h1>
      <p class="lede">Choose where this episode is going and review what each destination will include. Each destination keeps its own settings.</p>

      <div class="workspace">
        <div class="left">
          <div class="panel">
            <h2>Destinations</h2>
            <div id="destinations"></div>
          </div>

          <div class="panel">
            <h2 id="outcomes-title">Publishing outcomes</h2>
            <p id="outcomes-desc" style="font-size: 13px; color: var(--muted); margin-top: 0;"></p>
            <div id="outcomes" class="outcomes"></div>
            <div id="warnings" class="warnings"></div>
          </div>
        </div>

        <aside class="right">
          <div class="panel">
            <h2>Checklist impact</h2>
            <div id="checklist"></div>
          </div>
        </aside>
      </div>
    </main>

    <script>
      var DESTINATIONS = [
        {
          id: "youtube",
          name: "YouTube full episode",
          desc: "Full-length episode optimized for YouTube with chapters, captions, and thumbnail.",
          defaults: { video: "1080p", audio: "stereo mix", captions: "burned in", thumbnail: "required", metadata: "full", watermark: "none", naming: "episode-title" },
        },
        {
          id: "audio-only",
          name: "Audio-only podcast feed",
          desc: "Audio export for podcast apps and RSS feeds without video.",
          defaults: { video: "none", audio: "stereo mix", captions: "none", thumbnail: "required", metadata: "full", watermark: "none", naming: "audio-episode-title" },
        },
        {
          id: "private-review",
          name: "Private review copy",
          desc: "Watermarked lower-resolution copy for feedback before publishing.",
          defaults: { video: "720p", audio: "stereo mix", captions: "burned in", thumbnail: "optional", metadata: "title only", watermark: "review draft", naming: "review-episode-title" },
        },
        {
          id: "archive",
          name: "Archive copy",
          desc: "Full-quality copy for your own records, kept alongside the published version.",
          defaults: { video: "1080p", audio: "stereo mix", captions: "sidecar file", thumbnail: "optional", metadata: "full", watermark: "none", naming: "archive-episode-title" },
        },
      ];

      var OUTCOME_FIELDS = [
        { key: "video", label: "Video", options: ["1080p", "720p", "original", "none"] },
        { key: "audio", label: "Audio mix", options: ["stereo mix", "full quality"] },
        { key: "captions", label: "Captions", options: ["burned in", "sidecar file", "none"] },
        { key: "thumbnail", label: "Thumbnail", options: ["required", "optional", "none"] },
        { key: "metadata", label: "Metadata", options: ["full", "title only"] },
        { key: "watermark", label: "Watermark", options: ["none", "review draft", "sponsor review", "internal review"] },
      ];

      // State: exactly one primary, any number of additional, each with its own overrides.
      var primaryId = "youtube";
      var additionalIds = {};
      var overrides = {};
      var reviewedDests = {};

      var destinationsEl = document.getElementById("destinations");
      var outcomesEl = document.getElementById("outcomes");
      var outcomesTitleEl = document.getElementById("outcomes-title");
      var outcomesDescEl = document.getElementById("outcomes-desc");
      var warningsEl = document.getElementById("warnings");
      var checklistEl = document.getElementById("checklist");
      var viewingId = "youtube";

      function isActive(id) {
        return id === primaryId || additionalIds[id];
      }

      function effectiveSettings(id) {
        var dest = DESTINATIONS.find(function (d) { return d.id === id; });
        if (!dest) return {};
        var settings = {};
        for (var key in dest.defaults) {
          settings[key] = (overrides[id] && overrides[id][key]) || dest.defaults[key];
        }
        return settings;
      }

      function render() {
        renderDestinations();
        renderOutcomes();
        renderWarnings();
        renderChecklist();
      }

      function renderDestinations() {
        destinationsEl.replaceChildren();
        DESTINATIONS.forEach(function (dest) {
          var card = document.createElement("div");
          card.className = "dest-card" + (dest.id === primaryId ? " primary" : "");

          var info = document.createElement("div");
          var name = document.createElement("div");
          name.className = "name";
          name.textContent = dest.name;
          var desc = document.createElement("div");
          desc.className = "desc";
          desc.textContent = desc.textContent = dest.desc;
          info.append(name, desc);

          var badge = document.createElement("span");
          badge.className = "badge";
          if (dest.id === primaryId) {
            badge.classList.add("primary-badge");
            badge.textContent = "Primary";
          } else if (additionalIds[dest.id]) {
            badge.classList.add("additional-badge");
            badge.textContent = "Additional";
          } else {
            badge.classList.add("off-badge");
            badge.textContent = "Off";
          }

          card.append(info, badge);

          var actions = document.createElement("div");
          actions.className = "dest-actions";

          var viewBtn = document.createElement("button");
          viewBtn.textContent = "View outcomes";
          viewBtn.disabled = !isActive(dest.id);
          viewBtn.addEventListener("click", function () {
            viewingId = dest.id;
            reviewedDests[dest.id] = true;
            render();
          });
          actions.appendChild(viewBtn);

          if (dest.id !== primaryId) {
            var setPrimaryBtn = document.createElement("button");
            setPrimaryBtn.textContent = "Set as primary";
            setPrimaryBtn.addEventListener("click", function () {
              if (additionalIds[dest.id]) {
                delete additionalIds[dest.id];
              }
              primaryId = dest.id;
              viewingId = dest.id;
              render();
            });
            actions.appendChild(setPrimaryBtn);
          }

          if (dest.id !== primaryId) {
            if (additionalIds[dest.id]) {
              var removeBtn = document.createElement("button");
              removeBtn.textContent = "Remove";
              removeBtn.addEventListener("click", function () {
                delete additionalIds[dest.id];
                if (viewingId === dest.id) viewingId = primaryId;
                render();
              });
              actions.appendChild(removeBtn);
            } else {
              var addBtn = document.createElement("button");
              addBtn.textContent = "Add";
              addBtn.addEventListener("click", function () {
                additionalIds[dest.id] = true;
                viewingId = dest.id;
                render();
              });
              actions.appendChild(addBtn);
            }
          }

          card.appendChild(actions);
          destinationsEl.appendChild(card);
        });
      }

      function renderOutcomes() {
        var dest = DESTINATIONS.find(function (d) { return d.id === viewingId; });
        if (!dest || !isActive(viewingId)) {
          outcomesTitleEl.textContent = "Publishing outcomes";
          outcomesDescEl.textContent = "Select an active destination to see its settings.";
          outcomesEl.replaceChildren();
          return;
        }

        outcomesTitleEl.textContent = dest.name + " outcomes";
        outcomesDescEl.textContent = viewingId === primaryId
          ? "Primary destination \u2014 your show\u2019s default readiness summary speaks about this one first."
          : "Additional destination \u2014 settings are independent from the primary.";

        var settings = effectiveSettings(viewingId);
        outcomesEl.replaceChildren();

        OUTCOME_FIELDS.forEach(function (field) {
          var row = document.createElement("div");
          row.className = "outcome-row";

          var left = document.createElement("div");
          var label = document.createElement("div");
          label.className = "label";
          label.textContent = field.label;

          var isOverridden = overrides[viewingId] && overrides[viewingId][field.key];
          if (isOverridden) {
            var note = document.createElement("div");
            note.className = "value";
            note.textContent = "Overridden from preset default (" + dest.defaults[field.key] + ")";
            left.append(label, note);
          } else {
            left.appendChild(label);
          }

          var select = document.createElement("select");
          select.setAttribute("aria-label", field.label + " for " + dest.name);
          field.options.forEach(function (opt) {
            var option = document.createElement("option");
            option.value = opt;
            option.textContent = opt;
            option.selected = settings[field.key] === opt;
            select.appendChild(option);
          });
          select.addEventListener("change", function () {
            if (!overrides[viewingId]) overrides[viewingId] = {};
            if (select.value === dest.defaults[field.key]) {
              delete overrides[viewingId][field.key];
              if (Object.keys(overrides[viewingId]).length === 0) delete overrides[viewingId];
            } else {
              overrides[viewingId][field.key] = select.value;
            }
            render();
          });

          row.append(left, select);
          outcomesEl.appendChild(row);
        });
      }

      function renderWarnings() {
        warningsEl.replaceChildren();
        if (!isActive(viewingId)) return;

        var dest = DESTINATIONS.find(function (d) { return d.id === viewingId; });
        if (!dest) return;
        var settings = effectiveSettings(viewingId);
        var items = [];

        if (settings.thumbnail === "required") {
          items.push({ text: dest.name + " requires a thumbnail. Make sure one is selected.", tone: "review", fixScreen: "thumbnail-cover-frame.html", fixLabel: "Thumbnail" });
        }
        if (settings.captions === "none") {
          items.push({ text: dest.name + " will export without captions. Viewers watching without sound will miss spoken content.", tone: "review" });
        }
        if (settings.metadata === "title only") {
          items.push({ text: dest.name + " will ship without chapter metadata or guest links.", tone: "review", fixScreen: "episode-metadata-publishing.html", fixLabel: "Metadata" });
        }
        if (settings.watermark !== "none") {
          items.push({ text: dest.name + " will include a \u201c" + settings.watermark + "\u201d watermark on the video.", tone: "review" });
        }
        if (items.length === 0) {
          items.push({ text: dest.name + " is ready with recommended settings.", tone: "ok" });
        }

        items.forEach(function (item) {
          var div = document.createElement("div");
          div.className = "warning " + item.tone;
          div.textContent = item.text;
          if (item.fixScreen) {
            var link = document.createElement("a");
            link.className = "fix-link";
            link.href = item.fixScreen;
            link.textContent = "Open " + item.fixLabel + " \u2192";
            div.appendChild(link);
          }
          warningsEl.appendChild(div);
        });
      }

      function renderChecklist() {
        checklistEl.replaceChildren();
        var activeCount = 1 + Object.keys(additionalIds).length;

        var items = [
          { label: "Primary destination selected", done: true },
          { label: "Primary outcomes reviewed", done: !!reviewedDests[primaryId] },
        ];

        if (activeCount > 1) {
          items.push({ label: activeCount - 1 + " additional destination" + (activeCount > 2 ? "s" : "") + " prepared", done: true });
        }

        // Checklist items describe what the creator still needs to do. A destination
        // whose preset already includes the setting is covered by that preset — the
        // checklist only flags items that require creator action on another screen.
        var allDests = [primaryId].concat(Object.keys(additionalIds));
        var thumbnailNeeded = allDests.some(function (id) {
          return effectiveSettings(id).thumbnail === "required";
        });
        if (thumbnailNeeded) {
          items.push({ label: "Select a thumbnail for destinations that require it", done: false, fixScreen: "thumbnail-cover-frame.html" });
        }

        var captionsExcluded = allDests.some(function (id) {
          return effectiveSettings(id).captions === "none";
        });
        if (captionsExcluded) {
          var excludedNames = allDests
            .filter(function (id) { return effectiveSettings(id).captions === "none"; })
            .map(function (id) { return DESTINATIONS.find(function (d) { return d.id === id; }).name; });
          items.push({ label: excludedNames.join(", ") + " will ship without captions", done: true });
        }

        items.forEach(function (item) {
          var row = document.createElement("div");
          row.className = "outcome-row";
          var left = document.createElement("div");
          var label = document.createElement("div");
          label.className = "label";
          label.textContent = (item.done ? "\u2713 " : "\u25cb ") + item.label;
          label.style.color = item.done ? "var(--ok)" : "var(--warn)";
          left.appendChild(label);
          row.appendChild(left);
          if (item.fixScreen && !item.done) {
            var link = document.createElement("a");
            link.className = "fix-link";
            link.href = item.fixScreen;
            link.textContent = "Open \u2192";
            row.appendChild(link);
          }
          checklistEl.appendChild(row);
        });
      }

      render();

      if (typeof module !== "undefined") {
        module.exports = { DESTINATIONS: DESTINATIONS, OUTCOME_FIELDS: OUTCOME_FIELDS, effectiveSettings: effectiveSettings };
      }
    </script>
    <script src="../preview/publish-nav.js" defer></script>
  </body>
</html>
