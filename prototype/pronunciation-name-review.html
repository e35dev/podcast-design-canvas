<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pronunciation And Name Review Prototype</title>
    <style>
      :root {
        --ink: #17211f;
        --muted: #60706a;
        --line: #d7e1dd;
        --surface: #f8fbfa;
        --accent: #0f6a57;
        --review: #9b5d00;
        --ready-bg: #def3ed;
        --review-bg: #fff1d7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; color: var(--ink); background: #fff; }
      main { max-width: 1140px; margin: 0 auto; padding: 32px 20px 48px; }
      h1, h2, p { margin-top: 0; }
      h1 { font-size: 32px; line-height: 1.1; margin-bottom: 8px; }
      .lede { color: var(--muted); max-width: 760px; }
      .workspace { display: grid; grid-template-columns: minmax(0, 1.2fr) 340px; gap: 24px; margin-top: 28px; }
      .panel { border: 1px solid var(--line); border-radius: 8px; background: var(--surface); padding: 18px; }
      .entries { display: grid; gap: 12px; }
      .entry { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 14px; display: grid; gap: 10px; }
      .entry.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(15, 106, 87, 0.12); }
      .head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
      .head strong { display: block; margin-bottom: 4px; }
      .head span, .source, .moment-note, .summary li, .status-copy { color: var(--muted); }
      .badge {
        display: inline-flex; min-height: 30px; align-items: center; border-radius: 999px;
        padding: 0 11px; font-size: 13px; font-weight: 800;
      }
      .badge.review { background: var(--review-bg); color: var(--review); }
      .badge.ready { background: var(--ready-bg); color: var(--accent); }
      .source, .moment-note { font-size: 13px; }
      .controls { display: flex; flex-wrap: wrap; gap: 8px; }
      button {
        min-height: 38px; border: 1px solid #b9c8c3; border-radius: 6px; background: #fff;
        color: var(--ink); font: inherit; font-weight: 700; padding: 7px 11px; cursor: pointer;
      }
      .summary { margin: 0; padding-left: 18px; display: grid; gap: 8px; }
      .status-copy { margin-top: 10px; }
      .action-note {
        margin-top: 14px; border: 1px solid #c7d7d1; border-radius: 7px; background: #fff;
        color: var(--muted); padding: 11px 12px;
      }
      .action-note strong { display: block; color: var(--ink); margin-bottom: 4px; }
      .action-note a {
        display: inline-block; margin-top: 8px; color: var(--accent); font-weight: 700; text-decoration: none;
      }
      .action-note a:hover,
      .action-note a:focus-visible { text-decoration: underline; outline: 2px solid var(--accent); outline-offset: 2px; }
      .status-pill {
        display: inline-flex; min-height: 30px; align-items: center; border-radius: 999px;
        padding: 0 11px; font-size: 13px; font-weight: 800;
      }
      .status-pill.ready { background: var(--ready-bg); color: var(--accent); }
      .status-pill.review { background: var(--review-bg); color: var(--review); }
      @media (max-width: 920px) { .workspace { grid-template-columns: 1fr; } }
    </style>
    <script src="../preview/cleanup-nav.js" defer></script>
  </head>
  <body data-cleanup-step="pronunciation-name-review">
    <main>
      <h1>Pronunciation And Name Review Prototype</h1>
      <p class="lede">Confirm the spoken version of tricky names and terms in context, keep guest-preferred pronunciations visible, and carry trusted choices forward without turning this into a phonetics tool.</p>
      <section class="workspace">
        <div class="panel">
          <h2>Names And Terms To Review</h2>
          <div class="entries" id="entries"></div>
          <div class="controls" style="margin-top:16px;">
            <button type="button" id="confirmCurrent">Confirm current</button>
            <button type="button" id="markPreferred">Mark guest preferred</button>
            <button type="button" id="playMoment">Play moment in context</button>
          </div>
          <div class="action-note" id="actionNote" aria-live="polite"></div>
        </div>
        <aside class="panel">
          <h2>Publish Confidence</h2>
          <p id="statusBadge" class="status-pill review">Needs review</p>
          <p id="statusCopy" class="status-copy"></p>
          <ul class="summary" id="summary"></ul>
        </aside>
      </section>
    </main>
    <script>
      const INITIAL_ENTRIES = [
        {
          id: "dev-anand",
          spoken: true,
          who: "Guest",
          term: "Dev Anand",
          source: "Guest profile pronunciation note",
          cue: "Host intro at 00:18",
          note: "sounds like DEV uh-nund",
          status: "suggested",
        },
        {
          id: "ay-rin",
          spoken: true,
          who: "Host",
          term: "Ayrin Labs",
          source: "Creator typed note",
          cue: "Sponsor mention at 18:22",
          note: "sounds like AIR-in",
          status: "needs-review",
        },
        {
          id: "qdrift",
          spoken: false,
          who: "Shown in lower-third only",
          term: "Qdrift",
          source: "Glossary spelling",
          cue: "Appears on title card",
          note: "text only this episode",
          status: "not-spoken",
        },
      ];

      function statusLabel(status) {
        if (status === "confirmed") return "Confirmed";
        if (status === "suggested") return "Suggested";
        if (status === "needs-review") return "Needs review";
        if (status === "guest-preferred") return "Guest preferred";
        if (status === "not-spoken") return "Not spoken in episode";
        return "Unknown";
      }

      function entrySummary(entries) {
        const summary = { total: entries.length, needsReview: 0, confirmed: 0, guestPreferred: 0, notSpoken: 0 };
        entries.forEach((entry) => {
          if (entry.status === "confirmed") summary.confirmed += 1;
          else if (entry.status === "guest-preferred") summary.guestPreferred += 1;
          else if (entry.status === "not-spoken") summary.notSpoken += 1;
          else if (entry.spoken && (entry.status === "needs-review" || entry.status === "suggested")) summary.needsReview += 1;
        });
        return summary;
      }

      function isReadyForPublish(entries) {
        return entries.every((entry) => !entry.spoken || !["needs-review", "suggested"].includes(entry.status));
      }

      const state = {
        entries: INITIAL_ENTRIES.map((entry) => Object.assign({}, entry)),
        activeId: INITIAL_ENTRIES[0].id,
      };

      const entriesEl = document.getElementById("entries");
      const summaryEl = document.getElementById("summary");
      const statusBadgeEl = document.getElementById("statusBadge");
      const statusCopyEl = document.getElementById("statusCopy");
      const actionNoteEl = document.getElementById("actionNote");
      const confirmCurrentBtn = document.getElementById("confirmCurrent");
      const markPreferredBtn = document.getElementById("markPreferred");
      const playMomentBtn = document.getElementById("playMoment");

      function activeEntry() {
        return state.entries.find((entry) => entry.id === state.activeId) || state.entries[0];
      }

      function setActionNote(title, detail, fixScreen, fixLabel) {
        actionNoteEl.replaceChildren();
        const strong = document.createElement("strong");
        strong.textContent = title;
        const copy = document.createElement("span");
        copy.textContent = detail;
        actionNoteEl.append(strong, copy);
        if (fixScreen) {
          const link = document.createElement("a");
          link.href = fixScreen;
          link.textContent = `Open ${fixLabel}`;
          actionNoteEl.appendChild(link);
        }
      }

      function renderEntries() {
        entriesEl.replaceChildren();
        state.entries.forEach((entry) => {
          const article = document.createElement("article");
          article.className = `entry${entry.id === state.activeId ? " active" : ""}`;
          article.dataset.entry = entry.id;
          article.addEventListener("click", () => { state.activeId = entry.id; render(); });

          const head = document.createElement("div");
          head.className = "head";
          const info = document.createElement("div");
          const title = document.createElement("strong");
          title.textContent = entry.term;
          const who = document.createElement("span");
          who.textContent = `${entry.who} · ${entry.cue}`;
          info.append(title, who);

          const badge = document.createElement("span");
          badge.className = `badge ${["confirmed", "guest-preferred", "not-spoken"].includes(entry.status) ? "ready" : "review"}`;
          badge.textContent = statusLabel(entry.status);

          head.append(info, badge);

          const source = document.createElement("p");
          source.className = "source";
          source.textContent = `Source: ${entry.source}`;

          const note = document.createElement("p");
          note.className = "moment-note";
          note.textContent = entry.note;

          article.append(head, source, note);
          entriesEl.appendChild(article);
        });
      }

      function renderSummary() {
        const summary = entrySummary(state.entries);
        summaryEl.replaceChildren();
        [
          `${summary.confirmed} confirmed`,
          `${summary.guestPreferred} guest preferred`,
          `${summary.needsReview} spoken item${summary.needsReview === 1 ? "" : "s"} still need review`,
          `${summary.notSpoken} text-only item${summary.notSpoken === 1 ? "" : "s"}`
        ].forEach((line) => {
          const li = document.createElement("li");
          li.textContent = line;
          summaryEl.appendChild(li);
        });

        const ready = isReadyForPublish(state.entries);
        statusBadgeEl.className = `status-pill ${ready ? "ready" : "review"}`;
        statusBadgeEl.textContent = ready ? "Ready for publish" : "Needs review";
        statusCopyEl.textContent = ready
          ? "Every spoken pronunciation is confirmed or marked guest preferred for this episode."
          : "Suggested and needs-review spoken names both stay in the review queue until the creator confirms them or marks them guest preferred.";
      }

      function render() {
        renderEntries();
        renderSummary();
      }

      confirmCurrentBtn.addEventListener("click", () => {
        const entry = activeEntry();
        entry.status = entry.spoken ? "confirmed" : "not-spoken";
        setActionNote("Pronunciation confirmed", `“${entry.term}” is now trusted for spoken intros, outros, and review copy notes.`, "guest-profile-reuse.html", "guest profile reuse");
        render();
      });

      markPreferredBtn.addEventListener("click", () => {
        const entry = activeEntry();
        entry.status = entry.spoken ? "guest-preferred" : "not-spoken";
        setActionNote("Guest preference saved", `The preferred spoken version of “${entry.term}” will carry forward for recurring appearances.`, "guest-profile-reuse.html", "guest profile reuse");
        render();
      });

      playMomentBtn.addEventListener("click", () => {
        const entry = activeEntry();
        setActionNote("Playback opened in context", `Play the real moment for “${entry.term}” before deciding whether the pronunciation should stay as suggested or be updated.`, "transcript-search-navigation.html", "transcript search");
      });

      render();

      if (typeof module !== "undefined") {
        module.exports = {
          INITIAL_ENTRIES,
          statusLabel,
          entrySummary,
          isReadyForPublish,
        };
      }
    </script>
  </body>
</html>
