<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Show Brand Kit Setup Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #16211f;
        --muted: #5e6b67;
        --line: #d9e0dd;
        --panel: #f7faf8;
        --accent: #136f63;
        --accent-ink: #075246;
        --warn: #a15c00;
        --block: #a52828;
        --ok: #1a7a3a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1, h2, p { margin-top: 0; }

      h1 {
        font-size: 32px;
        line-height: 1.1;
        margin-bottom: 8px;
      }

      .lede {
        color: var(--muted);
        max-width: 760px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 1fr);
        gap: 24px;
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }

      .panel + .panel { margin-top: 18px; }

      .panel h2 {
        font-size: 16px;
        margin-bottom: 12px;
      }

      .input-group {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
      }

      .field input[type="text"],
      .field select {
        min-height: 40px;
        border: 1px solid #bfcbc7;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        padding: 8px 12px;
      }

      .field input[type="color"] {
        width: 48px;
        height: 40px;
        border: 1px solid #bfcbc7;
        border-radius: 6px;
        padding: 4px;
        cursor: pointer;
      }

      .color-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .color-row .swatch {
        display: inline-block;
        width: 28px;
        height: 28px;
        border-radius: 4px;
        border: 1px solid var(--line);
      }

      .color-row span {
        font-size: 13px;
        color: var(--muted);
      }

      /* Preview canvas */
      .brand-preview {
        position: relative;
        background: #1a1a2e;
        border-radius: 8px;
        overflow: hidden;
        aspect-ratio: 16 / 9;
        display: flex;
        flex-direction: column;
      }

      .preview-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        font-size: 13px;
        font-weight: 700;
        color: #ffffff;
      }

      .preview-logo {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 700;
        color: #ffffff;
      }

      .preview-body {
        flex: 1;
        display: flex;
        gap: 8px;
        padding: 0 16px;
      }

      .preview-speaker {
        flex: 1;
        border-radius: 6px;
        display: flex;
        align-items: flex-end;
        padding: 10px;
      }

      .preview-speaker .name-tag {
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 700;
        color: #ffffff;
      }

      .preview-caption {
        padding: 10px 16px;
        font-size: 12px;
        color: #ffffff;
        text-align: center;
      }

      .preview-caption span {
        padding: 3px 8px;
        border-radius: 4px;
      }

      /* Guardrails */
      .guardrails {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .guardrail {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
      }

      .guardrail.ok {
        background: #ecfdf5;
        color: var(--ok);
        border: 1px solid #a7f3d0;
      }

      .guardrail.warn {
        background: #fefbec;
        color: var(--warn);
        border: 1px solid #f0dca0;
      }

      button {
        font: inherit;
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--ink);
        padding: 7px 14px;
        font-size: 13px;
        font-weight: 600;
      }

      button:hover { background: var(--panel); }

      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .fix-link {
        font-size: 12px;
        font-weight: 700;
        color: var(--accent-ink);
        text-decoration: none;
        margin-left: 6px;
      }

      .fix-link:hover { text-decoration: underline; }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      @media (max-width: 860px) {
        .workspace { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body data-reuse-step="show-brand-kit-setup">
    <main>
      <h1>Show brand kit</h1>
      <p class="lede">Add your show's identity once. It carries into presets, captions, thumbnails, and future episodes automatically.</p>

      <div class="workspace">
        <div class="left">
          <div class="panel">
            <h2>Brand inputs</h2>
            <div class="input-group">
              <div class="field">
                <label for="show-name">Show name</label>
                <input type="text" id="show-name" value="The Creator Lab">
              </div>
              <div class="field">
                <label for="primary-color">Primary color</label>
                <div class="color-row">
                  <input type="color" id="primary-color" value="#136f63">
                  <span id="primary-hex">#136f63</span>
                </div>
              </div>
              <div class="field">
                <label for="accent-color">Accent color</label>
                <div class="color-row">
                  <input type="color" id="accent-color" value="#f0c040">
                  <span id="accent-hex">#f0c040</span>
                </div>
              </div>
              <div class="field">
                <label for="type-style">Type style</label>
                <select id="type-style">
                  <option value="clean" selected>Clean sans-serif</option>
                  <option value="editorial">Editorial serif</option>
                  <option value="bold">Bold condensed</option>
                  <option value="casual">Rounded casual</option>
                </select>
              </div>
              <div class="field">
                <label for="lower-third">Lower-third style</label>
                <select id="lower-third">
                  <option value="bar" selected>Solid bar</option>
                  <option value="pill">Rounded pill</option>
                  <option value="underline">Subtle underline</option>
                </select>
              </div>
              <div class="field">
                <label for="caption-emphasis">Caption emphasis</label>
                <select id="caption-emphasis">
                  <option value="subtle" selected>Subtle — just the active word</option>
                  <option value="moderate">Moderate — sentence highlight</option>
                  <option value="strong">Strong — full background bar</option>
                </select>
              </div>
            </div>
            <div class="actions">
              <button id="save-template">Save to show template</button>
              <button id="reset-defaults">Reset to defaults</button>
            </div>
          </div>
        </div>

        <aside class="right">
          <div class="panel">
            <h2>Preview</h2>
            <div id="preview" class="brand-preview" aria-label="Brand kit preview"></div>
            <p id="preview-desc" style="font-size: 12px; color: var(--muted); margin-top: 8px;"></p>
          </div>
          <div class="panel">
            <h2>Guardrails</h2>
            <div id="guardrails" class="guardrails"></div>
          </div>
        </aside>
      </div>
    </main>

    <script>
      // Show brand kit — lets a creator define their show's visual identity once
      // and preview how it affects the episode. Grounded in real show context
      // (The Creator Lab, hosted by Sarah Chen) matching the episode content used
      // throughout the product.

      var TYPE_FONTS = {
        clean: "'Inter', sans-serif",
        editorial: "'Georgia', serif",
        bold: "'Impact', sans-serif",
        casual: "'Nunito', sans-serif",
      };

      var showNameEl = document.getElementById("show-name");
      var primaryColorEl = document.getElementById("primary-color");
      var accentColorEl = document.getElementById("accent-color");
      var primaryHexEl = document.getElementById("primary-hex");
      var accentHexEl = document.getElementById("accent-hex");
      var typeStyleEl = document.getElementById("type-style");
      var lowerThirdEl = document.getElementById("lower-third");
      var captionEmphasisEl = document.getElementById("caption-emphasis");
      var previewEl = document.getElementById("preview");
      var previewDescEl = document.getElementById("preview-desc");
      var guardrailsEl = document.getElementById("guardrails");
      var saveBtn = document.getElementById("save-template");
      var resetBtn = document.getElementById("reset-defaults");

      var saved = false;

      function getKit() {
        return {
          showName: showNameEl.value || "Untitled Show",
          primary: primaryColorEl.value,
          accent: accentColorEl.value,
          typeStyle: typeStyleEl.value,
          lowerThird: lowerThirdEl.value,
          captionEmphasis: captionEmphasisEl.value,
        };
      }

      function luminance(hex) {
        var channels = [
          parseInt(hex.slice(1, 3), 16) / 255,
          parseInt(hex.slice(3, 5), 16) / 255,
          parseInt(hex.slice(5, 7), 16) / 255,
        ].map(function (c) {
          return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
        });
        return 0.2126 * channels[0] + 0.7152 * channels[1] + 0.0722 * channels[2];
      }

      function contrastRatio(hex1, hex2) {
        var l1 = luminance(hex1);
        var l2 = luminance(hex2);
        var lighter = Math.max(l1, l2);
        var darker = Math.min(l1, l2);
        return (lighter + 0.05) / (darker + 0.05);
      }

      function renderPreview() {
        var kit = getKit();
        previewEl.replaceChildren();
        previewEl.style.fontFamily = TYPE_FONTS[kit.typeStyle] || TYPE_FONTS.clean;

        // Header with logo
        var header = document.createElement("div");
        header.className = "preview-header";
        header.style.background = kit.primary;
        var logo = document.createElement("div");
        logo.className = "preview-logo";
        logo.style.background = kit.accent;
        logo.textContent = kit.showName.charAt(0);
        var title = document.createElement("span");
        title.textContent = kit.showName;
        header.append(logo, title);

        // Speaker frames
        var body = document.createElement("div");
        body.className = "preview-body";

        var speakers = [
          { name: "Sarah Chen", role: "Host", bg: "#136f63" },
          { name: "Marcus Rivera", role: "Guest", bg: "#2d6a9f" },
        ];

        speakers.forEach(function (speaker) {
          var frame = document.createElement("div");
          frame.className = "preview-speaker";
          frame.style.background = speaker.bg;

          var tag = document.createElement("span");
          tag.className = "name-tag";
          if (kit.lowerThird === "bar") {
            tag.style.background = kit.primary;
          } else if (kit.lowerThird === "pill") {
            tag.style.background = kit.primary;
            tag.style.borderRadius = "12px";
          } else {
            tag.style.borderBottom = "2px solid " + kit.accent;
            tag.style.background = "transparent";
          }
          tag.textContent = speaker.name;
          frame.appendChild(tag);
          body.appendChild(frame);
        });

        // Caption bar
        var caption = document.createElement("div");
        caption.className = "preview-caption";
        var captionSpan = document.createElement("span");
        captionSpan.textContent = "Welcome back to " + kit.showName;
        if (kit.captionEmphasis === "strong") {
          captionSpan.style.background = kit.primary;
        } else if (kit.captionEmphasis === "moderate") {
          captionSpan.style.background = "rgba(0,0,0,0.6)";
          captionSpan.style.borderBottom = "2px solid " + kit.accent;
        }

        caption.appendChild(captionSpan);
        previewEl.append(header, body, caption);
        previewDescEl.textContent = kit.typeStyle.charAt(0).toUpperCase() + kit.typeStyle.slice(1) + " type \u00b7 " + kit.lowerThird + " lower-third \u00b7 " + kit.captionEmphasis + " caption emphasis.";
      }

      function renderGuardrails() {
        var kit = getKit();
        guardrailsEl.replaceChildren();

        var items = [];
        var ratio = contrastRatio(kit.primary, "#ffffff");
        if (ratio < 3) {
          items.push({ tone: "warn", text: "Primary color has low contrast against white text (" + ratio.toFixed(1) + ":1). Captions may be hard to read.", fix: "audio-caption-quality-review.html", fixLabel: "Caption quality" });
        } else {
          items.push({ tone: "ok", text: "Primary color contrast is readable (" + ratio.toFixed(1) + ":1)." });
        }

        var accentRatio = contrastRatio(kit.accent, "#1a1a2e");
        if (accentRatio < 3) {
          items.push({ tone: "warn", text: "Accent color may not stand out against dark backgrounds (" + accentRatio.toFixed(1) + ":1). Logo and highlights could be lost." });
        } else {
          items.push({ tone: "ok", text: "Accent color has good visibility against dark backgrounds (" + accentRatio.toFixed(1) + ":1)." });
        }

        if (kit.captionEmphasis === "strong" && ratio < 4.5) {
          items.push({ tone: "warn", text: "Strong caption emphasis with this primary color may reduce readability for long-form viewing. Try a darker primary or switch to moderate emphasis." });
        }

        if (kit.showName.length > 30) {
          items.push({ tone: "warn", text: "Long show name may be truncated in lower-thirds and thumbnails.", fix: "thumbnail-cover-frame.html", fixLabel: "Thumbnail" });
        }

        if (items.every(function (i) { return i.tone === "ok"; })) {
          items.push({ tone: "ok", text: "Brand kit is ready to use across presets and templates." });
        }

        items.forEach(function (item) {
          var div = document.createElement("div");
          div.className = "guardrail " + item.tone;
          div.textContent = item.text;
          if (item.fix) {
            var link = document.createElement("a");
            link.className = "fix-link";
            link.href = item.fix;
            link.textContent = "Open " + item.fixLabel + " \u2192";
            div.appendChild(link);
          }
          guardrailsEl.appendChild(div);
        });
      }

      function render() {
        primaryHexEl.textContent = primaryColorEl.value;
        accentHexEl.textContent = accentColorEl.value;
        renderPreview();
        renderGuardrails();
      }

      showNameEl.addEventListener("input", render);
      primaryColorEl.addEventListener("input", render);
      accentColorEl.addEventListener("input", render);
      typeStyleEl.addEventListener("change", render);
      lowerThirdEl.addEventListener("change", render);
      captionEmphasisEl.addEventListener("change", render);

      saveBtn.addEventListener("click", function () {
        saved = true;
        saveBtn.textContent = "Saved to show template";
        saveBtn.disabled = true;
        setTimeout(function () {
          saveBtn.textContent = "Save to show template";
          saveBtn.disabled = false;
          saved = false;
        }, 2000);
      });

      resetBtn.addEventListener("click", function () {
        showNameEl.value = "The Creator Lab";
        primaryColorEl.value = "#136f63";
        accentColorEl.value = "#f0c040";
        typeStyleEl.value = "clean";
        lowerThirdEl.value = "bar";
        captionEmphasisEl.value = "subtle";
        saved = false;
        render();
      });

      render();

      if (typeof module !== "undefined") {
        module.exports = { TYPE_FONTS: TYPE_FONTS, luminance: luminance, contrastRatio: contrastRatio };
      }
    </script>
    <script src="../preview/reuse-nav.js" defer></script>
  </body>
</html>
