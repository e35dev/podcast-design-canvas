<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Publish Checklist Prototype</title>
    <style>
      :root {
        --ink: #17211d;
        --muted: #60706a;
        --line: #d7e1dd;
        --surface: #f8fbfa;
        --ready: #0f6a57;
        --review: #9b5d00;
        --blocked: #9f2626;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 8px;
        font-size: 32px;
        line-height: 1.1;
      }

      .lede {
        color: var(--muted);
        max-width: 720px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 24px;
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 18px;
      }

      .destination {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 18px;
      }

      .destination-note {
        margin-bottom: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
      }

      .destination-note strong,
      .destination-note span {
        display: block;
      }

      .destination-note strong {
        margin-bottom: 4px;
      }

      .destination-note span {
        color: var(--muted);
      }

      button {
        min-height: 38px;
        border: 1px solid #b9c8c3;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-weight: 700;
        padding: 7px 11px;
        cursor: pointer;
      }

      button[aria-pressed="true"] {
        border-color: var(--ready);
        background: #e0f3ee;
        color: var(--ready);
      }

      .checklist {
        display: grid;
        gap: 10px;
      }

      .item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 170px;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 13px;
      }

      .item strong {
        display: block;
        margin-bottom: 3px;
      }

      .item span {
        color: var(--muted);
      }

      select {
        min-height: 38px;
        border: 1px solid #b9c8c3;
        border-radius: 6px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        padding: 7px 9px;
      }

      .summary {
        display: grid;
        gap: 12px;
      }

      .badge {
        display: inline-flex;
        width: fit-content;
        min-height: 32px;
        align-items: center;
        border-radius: 999px;
        padding: 0 12px;
        font-weight: 800;
      }

      .badge.ready {
        background: #dcf4ed;
        color: var(--ready);
      }

      .badge.review {
        background: #fff1d7;
        color: var(--review);
      }

      .badge.blocked {
        background: #ffe0e0;
        color: var(--blocked);
      }

      .warning {
        border-left: 4px solid var(--review);
        border-radius: 6px;
        background: #ffffff;
        padding: 10px 12px;
      }

      .warning.blocked {
        border-left-color: var(--blocked);
      }

      .warning.ignored {
        border-left-color: #808b87;
      }

      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Publish checklist</h1>
      <p class="lede">Confirm the visible episode package before export. The checklist changes with the destination and reopens only the items that actually changed meaning.</p>

      <section class="grid">
        <div class="panel">
          <h2>Destination</h2>
          <div class="destination" id="destinations"></div>
          <div id="destinationNote" class="destination-note"></div>
          <div id="checklist" class="checklist"></div>
        </div>

        <aside class="panel summary" aria-live="polite">
          <h2>Export status</h2>
          <div id="status" class="badge ready">Ready</div>
          <div id="nextAction"></div>
          <div id="warnings"></div>
        </aside>
      </section>
    </main>

    <script>
      const destinations = {
        youtube: {
          label: "YouTube full episode",
          note: "Public publishing needs metadata, sponsor disclosure, a cover frame, and a regenerated final package.",
          reopen: {
            destination: ["review", "Confirm the public destination and its publishing consequences."],
            thumbnail: ["review", "A public episode still needs a cover frame for this destination."],
            metadata: ["review", "Publish fields should match the selected public destination."],
            sponsor: ["review", "Public sponsor disclosure should be confirmed again before export."],
            approvals: ["review", "Final publish approvals should match the destination you just selected."],
            package: ["review", "Regenerate the public-facing package after changing destination."],
          },
        },
        review: {
          label: "Client review copy",
          note: "Review copy needs the watermark, a matching review-approval pass, and a freshly generated review package.",
          reopen: {
            destination: ["review", "Confirm the review-copy destination and its visible review rules."],
            watermark: ["blocked", "Review copy must be clearly labeled before it leaves the workspace."],
            approvals: ["review", "Review approvals should match the exact copy being sent now."],
            package: ["review", "Regenerate the review package after the destination change."],
          },
        },
        archive: {
          label: "Archive master",
          note: "Archive export keeps only long-term handoff requirements and rechecks the master package.",
          reopen: {
            destination: ["review", "Confirm the archive destination and its long-term handoff consequences."],
            master: ["review", "Archive export should confirm master-quality output before handoff."],
            approvals: ["review", "Archive handoff should reflect the latest sign-off, not the previous destination."],
            package: ["review", "Create a clean archive package after changing destination."],
          },
        },
      };

      const items = [
        {
          id: "source",
          label: "Source media",
          detail: "Speaker tracks are synced and usable.",
          requiredFor: ["youtube", "review", "archive"],
        },
        {
          id: "captions",
          label: "Captions",
          detail: "Captions, speaker attribution, and glossary corrections are reviewed.",
          requiredFor: ["youtube", "review"],
        },
        {
          id: "thumbnail",
          label: "Thumbnail",
          detail: "A publish-ready cover frame is selected.",
          requiredFor: ["youtube"],
        },
        {
          id: "metadata",
          label: "Metadata",
          detail: "Title, description, chapters, and guest links are complete.",
          requiredFor: ["youtube"],
        },
        {
          id: "sponsor",
          label: "Sponsor disclosure",
          detail: "Sponsor placement and disclosure are confirmed for this destination.",
          requiredFor: ["youtube"],
        },
        {
          id: "destination",
          label: "Destination preset",
          detail: "The active destination preset matches the package the creator is about to export.",
          requiredFor: ["youtube", "review", "archive"],
        },
        {
          id: "export",
          label: "Export warnings",
          detail: "Destination-specific export warnings are resolved or intentionally ignored.",
          requiredFor: ["youtube", "review", "archive"],
        },
        {
          id: "approvals",
          label: "Review approvals",
          detail: "Required sign-off for this destination is complete.",
          requiredFor: ["youtube", "review", "archive"],
        },
        {
          id: "watermark",
          label: "Review watermark",
          detail: "Review copy is visibly labeled as a review surface.",
          requiredFor: ["review"],
        },
        {
          id: "master",
          label: "Archive quality",
          detail: "Archive export settings and handoff quality are preserved.",
          requiredFor: ["archive"],
        },
        {
          id: "package",
          label: "Final package",
          detail: "The destination-specific package has been generated after the latest checklist changes.",
          requiredFor: ["youtube", "review", "archive"],
        },
      ];

      const stateLabels = {
        ready: "Ready",
        review: "Needs review",
        blocked: "Blocked",
        ignored: "Ignored",
        "not-needed": "Not needed",
      };

      let selectedDestination = "youtube";
      let itemStates = {
        source: "ready",
        captions: "ready",
        thumbnail: "review",
        metadata: "blocked",
        sponsor: "review",
        destination: "ready",
        export: "ready",
        approvals: "review",
        watermark: "blocked",
        master: "review",
        package: "review",
      };
      let itemMessages = {
        thumbnail: "A current cover frame still needs approval for public publishing.",
        metadata: "Missing public-facing publish details should block export here.",
        sponsor: "Sponsor disclosure should be reviewed before the public package ships.",
        approvals: "The latest destination-sensitive sign-off still needs review.",
        package: "The package should be regenerated after final checklist changes.",
      };

      const destinationsElement = document.querySelector("#destinations");
      const destinationNoteElement = document.querySelector("#destinationNote");
      const checklistElement = document.querySelector("#checklist");
      const statusElement = document.querySelector("#status");
      const nextActionElement = document.querySelector("#nextAction");
      const warningsElement = document.querySelector("#warnings");

      function render() {
        destinationsElement.replaceChildren(
          ...Object.entries(destinations).map(([id, destination]) => {
            const button = document.createElement("button");
            button.type = "button";
            button.textContent = destination.label;
            button.setAttribute("aria-pressed", String(id === selectedDestination));
            button.addEventListener("click", () => changeDestination(id));
            return button;
          }),
        );

        destinationNoteElement.replaceChildren(
          makeLine("strong", destinations[selectedDestination].label),
          makeLine("span", destinations[selectedDestination].note),
        );

        checklistElement.replaceChildren(...items.map(renderItem));

        const result = evaluateChecklist();
        statusElement.className = `badge ${result.status}`;
        statusElement.textContent = result.status === "ready" ? "Ready to export" : result.status === "blocked" ? "Blocked" : "Needs review";
        nextActionElement.textContent = result.nextAction;
        warningsElement.replaceChildren(
          ...(result.warnings.length
            ? result.warnings.map(renderWarning)
            : [makeLine("p", "No destination warnings.")]),
        );
      }

      function renderItem(item) {
        const required = item.requiredFor.includes(selectedDestination);
        const state = required ? itemStates[item.id] : "not-needed";
        const article = document.createElement("article");
        article.className = "item";
        const note = required && itemMessages[item.id] ? ` ${itemMessages[item.id]}` : required ? "" : " Not required for this destination.";

        const copy = document.createElement("div");
        copy.replaceChildren(
          makeLine("strong", item.label),
          makeLine("span", `${item.detail}${note}`),
        );
        article.append(copy);

        const select = document.createElement("select");
        select.disabled = !required;
        for (const [value, label] of Object.entries(stateLabels)) {
          if (value === "not-needed" && required) {
            continue;
          }
          const option = document.createElement("option");
          option.value = value;
          option.textContent = label;
          option.selected = value === state;
          select.append(option);
        }
        select.addEventListener("change", () => {
          itemStates[item.id] = select.value;
          if (select.value === "ready" || select.value === "ignored") {
            delete itemMessages[item.id];
          }
          render();
        });
        article.append(select);
        return article;
      }

      function evaluateChecklist() {
        const relevantItems = items.filter((item) => item.requiredFor.includes(selectedDestination));
        const warnings = relevantItems
          .map((item) => ({ item, state: itemStates[item.id] }))
          .filter(({ state }) => state !== "ready" && state !== "not-needed");

        const status = warnings.some(({ state }) => state === "blocked")
          ? "blocked"
          : warnings.length
            ? "review"
            : "ready";

        return {
          status,
          warnings,
          nextAction: status === "ready"
            ? `Export ${destinations[selectedDestination].label}.`
            : status === "blocked"
              ? "Fix blocked checklist items before export."
              : "Review reopened or pending items before final export.",
        };
      }

      function changeDestination(nextDestination) {
        if (nextDestination === selectedDestination) {
          return;
        }

        selectedDestination = nextDestination;
        itemMessages = {};
        for (const [itemId, [nextState, message]] of Object.entries(destinations[nextDestination].reopen)) {
          itemStates[itemId] = nextState;
          itemMessages[itemId] = message;
        }
        render();
      }

      function renderWarning({ item, state }) {
        const warning = document.createElement("article");
        warning.className = `warning ${state}`;
        warning.replaceChildren(
          makeLine("strong", `${item.label}: ${stateLabels[state]}`),
          makeLine("p", itemMessages[item.id] || item.detail),
        );
        return warning;
      }

      function makeLine(tagName, text) {
        return Object.assign(document.createElement(tagName), {
          textContent: text,
        });
      }

      render();
    </script>
  </body>
</html>
